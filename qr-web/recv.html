<!doctype html>
<html lang="en" data-framework="javascript">

<head>
  <title>Cimbar Decoder</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="icon" type="image/png" href="favicon.ico">
</head>

<body>

  <style>
    * {
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100vh;
      height: -webkit-fill-available;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      background-color: white;
      background-image: linear-gradient(135deg, rgb(0, 0, 0) 65px, transparent 130px),
        repeating-linear-gradient(135deg, rgb(0, 0, 0) 0px, rgb(153, 197, 206) 1px, transparent 1px, transparent 30px),
        repeating-linear-gradient(45deg, rgb(0, 0, 0) 0px, rgb(153, 197, 206) 1px, transparent 1px, transparent 30px);
      background-size: cover;
      /* Safe area insets for notched phones */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* Prevent text selection and touch callout on mobile */
    * {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Allow text selection in debug/status areas */
    .statusbox,
    #errorbox {
      -webkit-user-select: text;
      user-select: text;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: black;
        color: white;
      }
    }

    #container {
      position: relative;
      width: 92%;
      max-width: 520px;
      aspect-ratio: 4 / 3;
      margin: 10px auto 0;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      z-index: 0;
    }

    video {
      height: 100%;
      width: 100%;
      object-fit: cover;
      transition: 1s opacity;
    }

    .statusbox {
      color: white;
      text-shadow: 1px 1px 1px green;
    }

    /* Camera selector bar */
    #cam-selector-bar {
      position: relative;
      width: 92%;
      max-width: 520px;
      margin: 10px auto 0;
      z-index: 3;
    }

    #cam-selector-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      color: rgba(255, 255, 255, 0.85);
      font-size: 14px;
      font-family: sans-serif;
      cursor: pointer;
      touch-action: manipulation;
      pointer-events: auto;
      transition: background 0.2s;
    }

    #cam-selector-btn:active {
      background: rgba(255, 255, 255, 0.1);
    }

    #cam-selector-btn .label {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #cam-selector-btn .arrow {
      transition: transform 0.25s;
      font-size: 12px;
      opacity: 0.6;
    }

    #cam-selector-btn .arrow.open {
      transform: rotate(180deg);
    }

    /* Camera dropdown list */
    #cam-list-panel {
      display: none;
      margin-top: 4px;
      background: rgba(30, 30, 35, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      overflow: hidden;
      pointer-events: auto;
    }

    #cam-list-panel.open {
      display: block;
    }

    .cam-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      font-family: sans-serif;
      cursor: pointer;
      touch-action: manipulation;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      transition: background 0.15s;
    }

    .cam-list-item:last-child {
      border-bottom: none;
    }

    .cam-list-item:active {
      background: rgba(255, 255, 255, 0.08);
    }

    .cam-list-item .check {
      color: #4cd964;
      font-size: 16px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .cam-list-item .check.active {
      opacity: 1;
    }

    .cam-list-item .cam-label {
      flex: 1;
      margin-left: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cam-list-item .cam-info {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      margin-left: auto;
      padding-right: 8px;
    }

    #cam-refresh-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      font-family: sans-serif;
      cursor: pointer;
      touch-action: manipulation;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      transition: color 0.2s;
    }

    #cam-refresh-btn:active {
      color: rgba(255, 255, 255, 0.85);
    }

    #cam-refresh-btn .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    #cam-refresh-btn.loading .spinner {
      display: inline-block;
    }

    #cam-refresh-btn.loading .refresh-text {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #progress_bars {
      position: relative;
      width: 92%;
      max-width: 520px;
      margin: 10px auto 0;
      z-index: 2;
    }

    .progress {
      display: block;
      height: 6px;
      margin-bottom: 4px;
      background: linear-gradient(90deg, #4cd964, #34c759);
      border-radius: 4px;
      max-width: 100%;
      width: 0;
      transition: width 0.3s ease;
      box-shadow: 0 0 8px rgba(76, 217, 100, 0.4);
    }

    .crosshairs {
      border-color: white !important;
    }

    .crosshairs.scanning_xhairs {
      border-color: #FFFF00 !important;
    }

    .crosshairs.active_xhairs {
      border-color: #00FF00 !important;
    }

    #crosshair1 {
      position: absolute;
      top: 15%;
      right: 20%;
      width: min(5%, 40px);
      height: min(5%, 40px);
      z-index: 1;
      border-right: clamp(2px, 0.5vw, 5px) groove;
      border-top: clamp(2px, 0.5vw, 5px) groove;
      box-shadow: inset 0 0 0 clamp(2px, 0.4vw, 4px) #555;
    }

    #crosshair2 {
      position: absolute;
      bottom: 20%;
      left: 15%;
      width: min(5%, 40px);
      height: min(5%, 40px);
      z-index: 1;
      border-left: clamp(2px, 0.5vw, 5px) groove;
      border-bottom: clamp(2px, 0.5vw, 5px) groove;
      box-shadow: inset 0 0 0 clamp(2px, 0.4vw, 4px) #555;
    }

    /* Debug panel */
    #debug-panel-btn {
      position: fixed;
      bottom: max(90px, env(safe-area-inset-bottom, 0px) + 80px);
      right: 12px;
      z-index: 40;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: rgba(255, 255, 255, 0.7);
      font-size: 18px;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: opacity 0.3s;
      opacity: 0.5;
      pointer-events: auto;
    }

    #debug-panel-btn:active {
      opacity: 1;
    }

    #debug-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 60;
      max-height: 45vh;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      transform: translateY(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      pointer-events: auto;
    }

    #debug-panel.open {
      transform: translateY(0);
    }

    #debug-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    #debug-panel-header span {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      font-family: monospace;
      letter-spacing: 1px;
    }

    #debug-panel-header button {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.6);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      touch-action: manipulation;
    }

    #debug-panel-header button:active {
      background: rgba(255, 255, 255, 0.1);
    }

    #debug-log {
      padding: 8px 12px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 11px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.85);
      white-space: pre-wrap;
      word-break: break-all;
      flex: 1;
      min-height: 80px;
      -webkit-user-select: text;
      user-select: text;
    }

    #debug-log .log-warn {
      color: #ffa500;
    }

    #debug-log .log-error {
      color: #ff4444;
    }

    #debug-log .log-info {
      color: #88ccff;
    }

    /* Dim the background when debug panel is open */
    #debug-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 55;
      background: rgba(0, 0, 0, 0.3);
      display: none;
      pointer-events: auto;
    }

    #debug-backdrop.open {
      display: block;
    }

    .invisible {
      display: none;
    }
  </style>

<div id="container">
    <video id="video" playsinline webkit-playsinline muted>
    </video>
    <div id="crosshair1" class="crosshairs"></div>
    <div id="crosshair2" class="crosshairs"></div>
  </div>

  <!-- Camera selector -->
  <div id="cam-selector-bar">
    <button id="cam-selector-btn" onclick="Recv.toggleCameraList()">
      <span class="label">📷 <span id="cam-current-label">Camera</span></span>
      <span class="arrow" id="cam-arrow">▾</span>
    </button>
    <div id="cam-list-panel">
      <div id="cam-list-items"></div>
      <div id="cam-refresh-btn" onclick="Recv.refreshCameraList()">
        <span class="spinner"></span>
        <span class="refresh-text">⟳ Refresh list</span>
      </div>
    </div>
  </div>

  <div id="progress_bars">
    <div class="progress"></div>
  </div>

  </div>

  <!-- Debug panel backdrop -->
  <div id="debug-backdrop" onclick="Recv.toggleDebugPanel()"></div>

  <!-- Debug log panel -->
  <div id="debug-panel">
    <div id="debug-panel-header">
      <span>Console Log</span>
      <div>
        <button onclick="Recv.copyLog()" style="margin-right:6px;">Copy</button>
        <button onclick="Recv.clearLog()">Clear</button>
      </div>
    </div>
    <div id="debug-log"></div>
  </div>

  <!-- Floating debug button -->
  <button id="debug-panel-btn" onclick="Recv.toggleDebugPanel()" title="Debug log">🐛</button>

  <!-- Hidden status elements for JS compatibility -->
  <span id="mode-val" style="display:none"></span>
  <div class="statusbox" id="errorbox" style="display:none"></div>
  <div class="statusbox" id="t0" style="display:none"></div>
  <div class="statusbox" id="t1" style="display:none"></div>
  <div class="statusbox" id="t2" style="display:none"></div>
  <div class="statusbox" id="t3" style="display:none"></div>
  <div class="statusbox" id="framesInFlight" style="display:none"></div>
  <div class="statusbox" id="tdec" style="display:none"></div>

  <script src="recv.2026-05-09T0146.js"></script>
  <script src="zstd.2026-05-09T0146.js"></script>

  <script type="text/javascript">
    // --- iOS Chrome Debug Diagnostics ---
    console.log('[CameraDiag] Protocol:', location.protocol);
    console.log('[CameraDiag] isSecureContext:', window.isSecureContext);
    console.log('[CameraDiag] UserAgent:', navigator.userAgent);
    console.log('[CameraDiag] mediaDevices exists:', !!navigator.mediaDevices);
    console.log('[CameraDiag] mediaDevices.getUserMedia exists:', !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));
    // Warn if not HTTPS (iOS Chrome will NOT show camera prompt)
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      console.error('[CameraDiag] ⚠️ NOT HTTPS — iOS Chrome will NEVER show camera permission prompt! Serve over HTTPS.');
    }

    // Detect mobile and reduce worker count accordingly
    var isMobile = /Mobi|Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
    var numWorkers = isMobile ? 2 : 4;
    if (navigator.hardwareConcurrency) {
      numWorkers = Math.min(navigator.hardwareConcurrency - 1, isMobile ? 3 : 4);
      numWorkers = Math.max(1, numWorkers);
    }
    console.log('[CameraDiag] Mobile:', isMobile, 'Workers:', numWorkers);
    Recv.init_ww(numWorkers);

    // --- Force online-only (PWA removed, must have network) ---
    (function() {
      var el = document.createElement('div');
      el.id = 'offline-overlay';
      el.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:sans-serif;text-align:center;padding:30px;';
      el.innerHTML = '<h1 style="font-size:24px;margin-bottom:16px;font-weight:300;">No Internet Connection</h1><p style="font-size:14px;opacity:0.7;max-width:280px;line-height:1.5;">This app requires an internet connection. Please check your network and try again.</p>';
      el.style.display = navigator.onLine ? 'none' : 'flex';
      document.body.appendChild(el);
      window.addEventListener('online', function() { el.style.display = 'none'; });
      window.addEventListener('offline', function() { el.style.display = 'flex'; });
    })();

    var video = document.querySelector('#video');

    // Remembers video element for later use
    Recv._videoEl = video;

    var Module = {};
    Module.onRuntimeInitialized = () => {
      console.log('[CameraDiag] WASM loaded, auto-starting camera');
      Recv.init_video(video);
    };
  </script>

  <script src="cimbar_js.2026-05-09T0146.js"></script>

</body>

</html>

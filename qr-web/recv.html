<html lang="en" data-framework="javascript">

<head>
  <title>Cimbar Decoder</title>

<body>

  <style>
    * {
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100vh;
      height: -webkit-fill-available;
      height: 100dvh;
    }

    body {
      background-color: white;
      background-image: linear-gradient(135deg, rgb(0, 0, 0) 65px, transparent 130px),
        repeating-linear-gradient(135deg, rgb(0, 0, 0) 0px, rgb(153, 197, 206) 1px, transparent 1px, transparent 30px),
        repeating-linear-gradient(45deg, rgb(0, 0, 0) 0px, rgb(153, 197, 206) 1px, transparent 1px, transparent 30px);
      background-size: cover;
      /* Safe area insets for notched phones */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* Prevent text selection and touch callout on mobile */
    * {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Allow text selection in debug/status areas */
    .statusbox,
    #errorbox {
      -webkit-user-select: text;
      user-select: text;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: black;
        color: white;
      }
    }

    #container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -100;
      overflow: hidden;
      /* Hide scrollbars */
    }

    video {
      height: 100%;
      width: 100%;
      z-index: -100;
      background-size: cover;
      transition: 1s opacity;
    }

    .statusbox {
      color: white;
      text-shadow: 1px 1px 1px green;
    }

    #progress_bars {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      margin-bottom: 1vh;
    }

    .progress {
      display: block;
      height: 1.2vh;
      margin-bottom: 1vh;
      background-color: white;
      border-top: 0.2vh inset navy;
      border-bottom: 0.4vh inset navy;
      border-right: 0.3vh inset navy;
      border-radius: 0 0.5vh 0.5vh 0;
      max-width: 100%;
      width: 0;
    }

    .crosshairs {
      border-color: white !important;
    }

    .crosshairs.scanning_xhairs {
      border-color: #FFFF00 !important;
    }

    .crosshairs.active_xhairs {
      border-color: #00FF00 !important;
    }

    #crosshair1 {
      position: fixed;
      top: 15%;
      right: 20%;
      width: min(5%, 40px);
      height: min(5%, 40px);
      z-index: -50;
      border-right: clamp(2px, 0.5vw, 5px) groove;
      border-top: clamp(2px, 0.5vw, 5px) groove;
      box-shadow: inset 0 0 0 clamp(2px, 0.4vw, 4px) #555;
    }

    #crosshair2 {
      position: fixed;
      bottom: 20%;
      left: 15%;
      width: min(5%, 40px);
      height: min(5%, 40px);
      z-index: -50;
      border-left: clamp(2px, 0.5vw, 5px) groove;
      border-bottom: clamp(2px, 0.5vw, 5px) groove;
      box-shadow: inset 0 0 0 clamp(2px, 0.4vw, 4px) #555;
    }

    /* Camera switch button - bottom center */
    #cam-switch-btn {
      position: fixed;
      bottom: max(20px, env(safe-area-inset-bottom, 0px) + 10px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid rgba(255, 255, 255, 0.6);
      color: white;
      font-size: 24px;
      cursor: pointer;
      touch-action: manipulation;
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: opacity 0.3s;
      opacity: 0.7;
    }

    #cam-switch-btn:hover,
    #cam-switch-btn:active {
      opacity: 1;
      background: rgba(0, 0, 0, 0.7);
    }

    /* Start camera overlay */
    #start-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: sans-serif;
      text-align: center;
      padding: 30px;
    }

    #start-overlay.hidden {
      display: none;
    }

    #start-overlay h1 {
      font-size: 28px;
      margin-bottom: 10px;
      font-weight: 300;
      letter-spacing: 2px;
    }

    #start-overlay p {
      font-size: 14px;
      margin-bottom: 30px;
      opacity: 0.7;
      max-width: 280px;
      line-height: 1.5;
    }

    #start-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.6);
      color: white;
      font-size: 36px;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: all 0.3s;
      margin-bottom: 16px;
    }

    #start-btn:active {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.1);
    }

    #start-btn-label {
      font-size: 13px;
      opacity: 0.6;
      letter-spacing: 1px;
    }

    /* Debug panel */
    #debug-panel-btn {
      position: fixed;
      bottom: max(90px, env(safe-area-inset-bottom, 0px) + 80px);
      right: 12px;
      z-index: 40;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: rgba(255, 255, 255, 0.7);
      font-size: 18px;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: opacity 0.3s;
      opacity: 0.5;
      pointer-events: auto;
    }

    #debug-panel-btn:active {
      opacity: 1;
    }

    #debug-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 60;
      max-height: 45vh;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      transform: translateY(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      pointer-events: auto;
    }

    #debug-panel.open {
      transform: translateY(0);
    }

    #debug-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    #debug-panel-header span {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      font-family: monospace;
      letter-spacing: 1px;
    }

    #debug-panel-header button {
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.6);
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      touch-action: manipulation;
    }

    #debug-panel-header button:active {
      background: rgba(255, 255, 255, 0.1);
    }

    #debug-log {
      padding: 8px 12px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 11px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.85);
      white-space: pre-wrap;
      word-break: break-all;
      flex: 1;
      min-height: 80px;
      -webkit-user-select: text;
      user-select: text;
    }

    #debug-log .log-warn {
      color: #ffa500;
    }

    #debug-log .log-error {
      color: #ff4444;
    }

    #debug-log .log-info {
      color: #88ccff;
    }

    /* Dim the background when debug panel is open */
    #debug-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 55;
      background: rgba(0, 0, 0, 0.3);
      display: none;
      pointer-events: auto;
    }

    #debug-backdrop.open {
      display: block;
    }

    #nav-container:focus-within {
      z-index: 1;
    }

    #nav-content,
    #nav-container .bg,
    #nav-container:focus-within #nav-button {
      z-index: 1;
    }

    /* options */
    #nav-container a.mode-auto,
    #nav-container a.mode-b {
      color: #555;
    }

    #nav-container.mode-auto a.mode-auto,
    #nav-container.mode-b a.mode-b {
      color: #9fa6b2;
    }

    /* nav stuff */
    /* built off of https://codepen.io/dannievinther/pen/NvZjvz */
    #nav-container {
      position: fixed;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #nav-container .bg {
      pointer-events: auto;
      position: absolute;
      left: 0;
      width: 100%;
      height: 100%;
      visibility: hidden;
      opacity: 0;
      transition: .3s;
      background: black;
    }

    #nav-container:focus-within .bg {
      visibility: visible;
      opacity: .6;
    }

    #nav-container * {
      visibility: visible;
    }

    #nav-button {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 60px;
      width: 30px;
      margin-left: 15px;
      cursor: pointer;
      pointer-events: auto;
      touch-action: manipulation;
      border: 0;
      outline: 0;
      background-image: linear-gradient(180deg, rgb(0, 0, 0, 0) 10%, rgb(0, 0, 0) 40%, rgb(0, 0, 0) 60%, rgb(0, 0, 0, 0) 90%);
      background-color: initial;
    }

    #nav-button.hide {
      opacity: 0;
      transition: .3s;
    }

    #nav-container:focus-within #nav-button.hide {
      opacity: 1;
    }

    .icon-bar {
      display: block;
      width: 100%;
      height: 3px;
      transition: .3s;
    }

    .icon-bar+.icon-bar {
      margin-top: 3px;
    }

    #nav-container .icon-bar:nth-of-type(1) {
      background-color: #00ff00;
      box-shadow: 0px 0px 5px #00ff00, 0px 0px 2px #00ff00;
    }

    #nav-container .icon-bar:nth-of-type(2) {
      background-color: #ffff00;
      box-shadow: 0px 0px 5px #ffff00, 0px 0px 2px #ffff00;
    }

    #nav-container .icon-bar:nth-of-type(3) {
      background-color: #00ffff;
      box-shadow: 0px 0px 5px #00ffff, 0px 0px 2px #00ffff;
    }

    #nav-container .icon-bar:nth-of-type(4) {
      background-color: #ff00ff;
      box-shadow: 0px 0px 5px #ff00ff, 0px 0px 2px #ff00ff;
    }

    #nav-container.mode-4c .icon-bar:nth-of-type(1) {
      background-color: #00ffff;
      box-shadow: 0px 0px 5px #00ffff, 0px 0px 2px #00ffff;
    }

    #nav-container.mode-4c .icon-bar:nth-of-type(2) {
      background-color: #ffff00;
      box-shadow: 0px 0px 5px #ffff00, 0px 0px 2px #ffff00;
    }

    #nav-container.mode-4c .icon-bar:nth-of-type(3) {
      background-color: #00ff00;
      box-shadow: 0px 0px 5px #00ff00, 0px 0px 2px #00ff00;
    }

    #nav-container.mode-4c .icon-bar:nth-of-type(4) {
      background-color: #ff00ff;
      box-shadow: 0px 0px 5px #ff00ff, 0px 0px 2px #ff00ff;
    }

    #nav-container:focus-within #nav-button {
      pointer-events: none;
    }

    #nav-container:focus-within .icon-bar {
      background-color: #aaa;
      background-image: none !important;
      box-shadow: none !important;
    }

    #nav-button.attention:focus-within .icon-bar {
      background-color: #00ffff;
    }

    #nav-container:focus-within .icon-bar:nth-of-type(1) {
      transform: translate3d(0, 9px, 0) rotate(45deg);
    }

    #nav-container:focus-within .icon-bar:nth-of-type(2),
    #nav-container:focus-within .icon-bar:nth-of-type(3) {
      opacity: 0;
    }

    #nav-container:focus-within .icon-bar:nth-of-type(4) {
      transform: translate3d(0, -9px, 0) rotate(-45deg);
    }

    #nav-content {
      margin-top: 60px;
      padding: 20px;
      position: absolute;
      top: 0;
      left: 0;
      height: calc(100% - 60px);
      height: calc(100dvh - 60px);
      overflow-x: clip;
      background-color: #282C34;
      text-align: center;
      pointer-events: auto;
      -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
      transform: translateX(-100%);
      transition: transform .3s;
      min-width: 220px;
    }

    /* Full-width nav on mobile */
    @media (max-width: 480px) {
      #nav-content {
        width: 100%;
        padding: 20px 0;
      }
    }

    #nav-content ul {
      height: calc(100% - 60px);
      display: flex;
      flex-direction: column;
      list-style: none;
    }

    #nav-content hr {
      border: 1px solid #444;
    }

    #nav-content li a {
      display: block;
      padding: 10px 5px;
      color: #9fa6b2;
      text-decoration: none;
      transition: color .1s;
    }

    #nav-content li a.attention {
      animation: glowing 1.5s infinite alternate;
    }

    #nav-content li a {
      font-variant: small-caps;
      font-size: 2em;
    }

    #nav-content h4 {
      color: gray;
      font-variant: small-caps;
      padding-top: 1em;
    }

    #nav-content li.modesel a {
      display: inline-block;
      width: 4em;
    }

    #nav-content li:hover {
      background-color: #2c323c;
    }

    #nav-content li:not(.small)+.small {
      margin-top: auto;
    }

    #nav-content li.small {
      display: flex;
      align-self: center;
    }

    #nav-content li.small a {
      font-size: 1em;
    }

    #nav-container:focus-within #nav-content,
    #debug_menu:focus-within {
      transform: none;
    }

    #debug_menu {
      transform: translateX(100%);
      margin-top: 60px;
      right: 0;
      padding: 20px;
      position: absolute;
      top: 0;
      max-width: 95%;
      z-index: 2;
      transition: transform .3s;
      opacity: 95%;
      background-color: black;
    }

    .invisible {
      display: none;
    }

    @keyframes glowing {
      0% {
        color: #00ffff;
      }
    }
  </style>

  <script type="text/javascript">
    // --- iOS Chrome Debug Diagnostics ---
    console.log('[CameraDiag] Protocol:', location.protocol);
    console.log('[CameraDiag] isSecureContext:', window.isSecureContext);
    console.log('[CameraDiag] UserAgent:', navigator.userAgent);
    console.log('[CameraDiag] mediaDevices exists:', !!navigator.mediaDevices);
    console.log('[CameraDiag] mediaDevices.getUserMedia exists:', !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia));
    // Warn if not HTTPS (iOS Chrome will NOT show camera prompt)
    if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
      console.error('[CameraDiag] ⚠️ NOT HTTPS — iOS Chrome will NEVER show camera permission prompt! Serve over HTTPS.');
    }

    // Detect mobile and reduce worker count accordingly
    var isMobile = /Mobi|Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent);
    var numWorkers = isMobile ? 2 : 4;
    if (navigator.hardwareConcurrency) {
      numWorkers = Math.min(navigator.hardwareConcurrency - 1, isMobile ? 3 : 4);
      numWorkers = Math.max(1, numWorkers);
    }
    console.log('[CameraDiag] Mobile:', isMobile, 'Workers:', numWorkers);
    Recv.init_ww(numWorkers);
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./recv-sw.js');
    }
    var video = document.querySelector('#video');

    // Remembers video element for later use when user taps Start
    Recv._videoEl = video;

    // Show iOS hint if on Apple mobile device (Chrome/Safari on iPhone/iPad)
    if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
      var iosHint = document.getElementById('ios-hint');
      if (iosHint) iosHint.style.display = 'block';
    }

    var Module = {};
    Module.onRuntimeInitialized = () => {
      console.log('[CameraDiag] WASM loaded, waiting for user to tap Start');
      // Camera is NOT auto-started — user must tap the start button
      // This ensures mobile browsers show permission dialog on user gesture
    };
  </script>
